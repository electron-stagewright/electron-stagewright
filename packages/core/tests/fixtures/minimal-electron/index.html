<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Stagewright Fixture</title>
  </head>
  <body>
    <h1>Stagewright minimal fixture</h1>
    <button id="ping">Ping</button>
    <!-- Interactive controls exercised by the gated interaction smoke. -->
    <input id="name" type="text" aria-label="Name" />
    <label><input id="agree" type="checkbox" /> Agree to terms</label>
    <select id="fruit" aria-label="Fruit">
      <option value="apple">Apple</option>
      <option value="pear">Pear</option>
    </select>
    <!-- Editor simulation for the gated editor-typing smoke. #dead-editor mimics a
         code editor's hidden textarea: it is offscreen + aria-hidden and clears
         itself on every input event, so any value routed straight to it (the fill
         electron_type does, or a force-focused electron_keyboard_type) is swallowed
         — exercising the TYPE_NO_EFFECT effect-check. #editor is the visible content
         area: clicking focuses it and real keystrokes land in its textContent —
         exercising electron_type_into_editor's click-then-type-active recovery. -->
    <textarea
      id="dead-editor"
      aria-hidden="true"
      style="position: absolute; left: -9999px; width: 1px; height: 1px"
      oninput="this.value = ''"
    ></textarea>
    <div
      id="editor"
      contenteditable="true"
      role="textbox"
      aria-label="Editor"
      style="border: 1px solid #ccc; min-height: 2em"
    ></div>
    <!-- Logs on click, so the gated observe smoke can capture a console entry
         reliably (after the session's console listener has attached). -->
    <button id="log" onclick="console.log('stagewright-console-probe')">Log</button>
    <!-- Native dialogs exercised by the gated observe smoke. The session's dialog
         listener auto-responds per the armed policy, so the click resolves.
         NOTE: Electron does not support window.prompt() (it is a no-op that returns
         null and fires no dialog), so the smoke uses confirm + alert; prompt-text
         handling is covered by the unit tests via the transport fake. -->
    <button id="confirm" onclick="window.__confirmed = window.confirm('proceed?')">Confirm</button>
    <button id="alert" onclick="window.alert('heads up')">Alert</button>
  </body>
</html>
