<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Stagewright Fixture</title>
  </head>
  <body>
    <h1>Stagewright minimal fixture</h1>
    <button id="ping">Ping</button>
    <!-- Interactive controls exercised by the gated interaction smoke. -->
    <input id="name" type="text" aria-label="Name" />
    <label><input id="agree" type="checkbox" /> Agree to terms</label>
    <select id="fruit" aria-label="Fruit">
      <option value="apple">Apple</option>
      <option value="pear">Pear</option>
    </select>
    <!-- Logs on click, so the gated observe smoke can capture a console entry
         reliably (after the session's console listener has attached). -->
    <button id="log" onclick="console.log('stagewright-console-probe')">Log</button>
  </body>
</html>
