<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Stagewright Bench App</title>
  </head>
  <body>
    <!-- Greeting form: drives the round-trip contrast (primitive chain vs expect_*). -->
    <label>Your name <input id="name" type="text" aria-label="Your name" /></label>
    <button id="greet" type="button">Greet</button>
    <p id="status">No greeting yet</p>

    <!-- Deferred load: drives the error-recovery path. Clicking Load injects #late after a
         short delay, so a read before the load deterministically misses it. -->
    <button id="load" type="button">Load details</button>
    <div id="details-slot"></div>

    <!-- A sizable list: makes a full snapshot genuinely large, so the snapshot-diff
         contrast (full re-scan vs only-what-changed) shows a real token difference.
         Refresh relabels one item, producing a one-entry diff. -->
    <button id="refresh" type="button">Refresh list</button>
    <ul id="item-list"></ul>

    <script>
      document.getElementById('greet').addEventListener('click', () => {
        const who = document.getElementById('name').value.trim() || 'stranger'
        document.getElementById('status').textContent = `Hello, ${who}!`
      })

      document.getElementById('load').addEventListener('click', () => {
        setTimeout(() => {
          const p = document.createElement('p')
          p.id = 'late'
          p.textContent = 'Details loaded'
          document.getElementById('details-slot').append(p)
        }, 400)
      })

      // Build a list of 24 buttons so the accessibility snapshot has real bulk.
      const list = document.getElementById('item-list')
      for (let i = 1; i <= 24; i += 1) {
        const li = document.createElement('li')
        const btn = document.createElement('button')
        btn.type = 'button'
        btn.textContent = `Item ${String(i).padStart(2, '0')}`
        li.append(btn)
        list.append(li)
      }

      // Refresh relabels the first item, a single-element change a snapshot diff captures.
      let refreshCount = 0
      document.getElementById('refresh').addEventListener('click', () => {
        refreshCount += 1
        const first = list.querySelector('button')
        if (first) first.textContent = `Item 01 (updated ${refreshCount})`
      })
    </script>
  </body>
</html>
