<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Storage fixture</title>
  </head>
  <body>
    <h1>Storage fixture</h1>
    <!-- The page reports its own origin so the smoke can target it when seeding a cookie. -->
    <pre id="origin"></pre>
    <button id="read">Read cookie</button>
    <pre id="cookie"></pre>
    <!-- Readiness marker for the async IndexedDB seed below, so the smoke waits before reading IDB. -->
    <pre id="idb"></pre>
    <script>
      // Seed a localStorage entry on load, so the storage snapshot can assert the origin's localStorage.
      localStorage.setItem('cart', '3-items')
      document.getElementById('origin').textContent = location.origin
      // Re-read document.cookie on demand, so the smoke can assert a seeded (non-httpOnly) cookie is
      // visible to the page — proving the seeded cookie reached the real Chromium cookie store.
      document.getElementById('read').addEventListener('click', () => {
        document.getElementById('cookie').textContent = document.cookie
      })
      // Seed an IndexedDB database (appdb) + in-line-key store (docs) with one record, then flip the
      // #idb readiness marker — the IDB smoke waits for it before reading.
      const open = indexedDB.open('appdb', 1)
      open.onupgradeneeded = () => {
        open.result.createObjectStore('docs', { keyPath: 'id' })
      }
      open.onsuccess = () => {
        const db = open.result
        const tx = db.transaction('docs', 'readwrite')
        tx.objectStore('docs').put({ id: 'seed', title: 'Seeded doc' })
        tx.oncomplete = () => {
          db.close()
          document.getElementById('idb').textContent = 'seeded'
        }
      }
    </script>
  </body>
</html>
