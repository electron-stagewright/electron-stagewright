name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  example-minimal-app:
    name: Example minimal-app scenario
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @electron-stagewright/core exec playwright install-deps
      - run: pnpm build
      # electron is approved in pnpm-workspace.yaml (allowBuilds), but pnpm's build
      # and store caches can restore it without a usable binary, so its postinstall
      # is skipped on a cache hit. Resolve electron the same way the server does,
      # remove any stale dist/path.txt to force a clean download, run its installer,
      # and assert the path.txt the launcher reads now exists. Playwright supplies
      # the OS libraries Electron/Chromium need; Xvfb provides the display.
      - name: Ensure the Electron binary
        run: |
          set -eux
          ELEC=$(cd packages/core && node -e "process.stdout.write(require('node:path').dirname(require.resolve('electron')))")
          test -n "$ELEC"
          rm -rf "$ELEC/dist" "$ELEC/path.txt"
          node "$ELEC/install.js"
          test -f "$ELEC/path.txt"
      - name: Run the minimal-app scenario under a virtual display
        run: xvfb-run --auto-servernum pnpm --filter @electron-stagewright/example-minimal-app scenario
