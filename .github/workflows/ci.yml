name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build core first: packages that import @electron-stagewright/core by name (e.g.
      # plugin-trace) resolve it through its published dist, which a clean checkout has not
      # built yet. Without this, typecheck fails with "Cannot find module".
      - run: pnpm --filter @electron-stagewright/core build
      - run: pnpm lint
      - run: pnpm typecheck

  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [24, 26]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build core first so packages whose tests import @electron-stagewright/core by name
      # (e.g. plugin-trace) can resolve its dist; a clean checkout has not built it yet.
      - run: pnpm --filter @electron-stagewright/core build
      - run: pnpm test

  coverage:
    name: Coverage thresholds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build core first so packages whose tests import @electron-stagewright/core by name can
      # resolve its dist (same reason as the test job).
      - run: pnpm --filter @electron-stagewright/core build
      # Fails when line/branch/statement/function coverage drops below the floors in
      # vitest.config.ts, so the token-economy and correctness suites can't silently decay.
      - run: pnpm test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
